# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ocs2_arm_controller:
      type: ocs2_arm_controller/Ocs2ArmController

ocs2_arm_controller:
  ros__parameters:
    # Joint configuration
    update_rate: 1000  # Hz
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - joint7

    command_interfaces:
      - position
    state_interfaces:
      - position

    robot_name: tj2

    # Future time offset for trajectory prediction (in seconds)
    future_time_offset: 1.0
    # Control parameters
    home_pos: [1.9278, 1.347, -1.5708, 1.215, 0.0, 0.693, -0.187]
    rest_pos: [1.5708, 1.5708, -1.5708, 0.0, 0.0, 0.0, 0.0,]
    cached_ob_state: true                # cache observation state when there is some latency between hardware read and write 
    hardware_latency: 0.2             # (in S) hardware write and read latency
    post_proc_bwf: false                 # use butterworthfilter 
    use_early_stop: false                # toggle early stop mechanism
    # stop MPC when cost run out of scope
    clip_mpc_cost: true                  # when MPC cost run out of scope, stop updaing policy
    maximum_allowed_cost: 50.0           # maximum allowed cost


